services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: guild
      POSTGRES_PASSWORD: guild
      POSTGRES_DB: guild
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: guild
      MINIO_ROOT_PASSWORD: guildguild
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres-data:
  minio-data:

