        reason:
          $ref: "#/components/schemas/NonEmptyString"
        required_approvals:
          type: integer
          minimum: 1
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalDecision"
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        expires_at:
          $ref: "#/components/schemas/Timestamp"
        created_at:
          $ref: "#/components/schemas/Timestamp"
    PromotionGate:
