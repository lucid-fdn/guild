        created_at:
          $ref: "#/components/schemas/Timestamp"
        updated_at:
          $ref: "#/components/schemas/Timestamp"
    GovernancePolicy:
      type: object
      additionalProperties: false
      required: [schema_version, policy_id, institution_id, name, applies_to, rules, created_at]
      properties:
        schema_version:
          type: string
          const: v1alpha1
        policy_id:
          $ref: "#/components/schemas/UUID"
        institution_id:
          $ref: "#/components/schemas/UUID"
        name:
          $ref: "#/components/schemas/NonEmptyString"
        description:
          type: string
        applies_to:
          type: array
          minItems: 1
          items:
            type: string
            enum: [taskpack, artifact, promotion_record, commons_entry]
        rules:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [rule_id, effect, condition]
            properties:
              rule_id:
                type: string
                pattern: ^[a-z0-9][a-z0-9_-]{1,63}$
              effect:
                type: string
                enum: [allow, deny, require_approval]
              condition:
                $ref: "#/components/schemas/NonEmptyString"
              min_approvals:
                type: integer
                minimum: 0
        created_at:
          $ref: "#/components/schemas/Timestamp"
    ApprovalDecision:
      type: object
      additionalProperties: false
      required: [actor, decision, decided_at]
      properties:
        actor:
          $ref: "#/components/schemas/ActorRef"
        decision:
          type: string
          enum: [approved, rejected]
        comment:
          type: string
        decided_at:
          $ref: "#/components/schemas/Timestamp"
    ApprovalRequest:
      type: object
      additionalProperties: false
      required: [schema_version, approval_id, taskpack_id, requested_by, reason, required_approvals, status, created_at]
      properties:
        schema_version:
          type: string
          const: v1alpha1
        approval_id:
          $ref: "#/components/schemas/UUID"
        taskpack_id:
          $ref: "#/components/schemas/UUID"
